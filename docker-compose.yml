services:
    # ---- PostgreSQL Database ----
    db:
        image: postgres:17.6-alpine # Official Postgres image, no Dockerfile needed
        container_name: vizsgaremek-db
        restart: unless-stopped # Auto-restart if it crashes
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: admin123
            POSTGRES_DB: vizsgaremek
        ports:
            - "5432:5432" # host:container - lets you connect with pgAdmin too
        volumes:
            - postgres_data:/var/lib/postgresql/data # Persist data even if container is deleted
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U admin -d vizsgaremek"]
            interval: 5s # Check every 5 seconds
            timeout: 5s # Fail if no response in 5 seconds
            retries: 5 # Try 5 times before marking as unhealthy
            start_period: 10s # Give postgres 10 seconds to start before checking

    # ---- .NET Backend ----
    backend:
        build:
            context: ./apps/backend # Where to find the Dockerfile
            dockerfile: Dockerfile
        container_name: vizsgaremek-backend
        restart: unless-stopped
        ports:
            - "8080:8080"
        environment:
            - ASPNETCORE_ENVIRONMENT=Production
            - ASPNETCORE_URLS=http://+:8080
            - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=vizsgaremek;Username=admin;Password=admin123;Trust Server Certificate=true;
            - jwt-secret-key=verylongsecretkeytoaccesseverythingyouneedandidontknowwhattowriteherehelpmeplease123456789012344567789990100
            - AppSettings__Issuer=MyAppIssuer
            - AppSettings__Audience=MyAppAudienc
        depends_on:
            db:
                condition: service_healthy # Wait for DB to be ready before starting

    # ---- Next.js Frontend ----
    web:
        build:
            context: . # Root of monorepo (needs access to packages/)
            dockerfile: apps/web/Dockerfile
        container_name: vizsgaremek-web
        restart: unless-stopped
        ports:
            - "3000:3000"
        env_file:
            # Tell the frontend where the backend is
            - ./apps/web/.env.docker
        depends_on:
            - backend # Start backend first

volumes:
    postgres_data: # Named volume - data survives container restarts
